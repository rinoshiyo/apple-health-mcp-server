name: Release

# Push a tag matching `v*` (e.g. `v0.1.0`) to build the wheel + sdist
# and publish them to PyPI via OIDC Trusted Publishing — no API keys
# are stored in this repository.
#
# One-time setup (manual, maintainer only):
#   https://pypi.org/manage/account/publishing/
#   PyPI Project name:     apple-health-mcp-server
#   Owner:                 rinoshiyo
#   Repository name:       apple-health-mcp-server
#   Workflow filename:     release.yml
#   Environment name:      pypi
# See CLAUDE.md section 8 for the full runbook.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Build sdist and wheel
        run: uv build

      - name: Verify metadata with twine
        run: uvx twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish to PyPI via Trusted Publishing
    needs: build
    runs-on: ubuntu-latest
    # `pypi` environment must be configured on PyPI as the Trusted
    # Publisher target; see the comment block at the top of this file.
    environment:
      name: pypi
      url: https://pypi.org/project/apple-health-mcp-server/
    permissions:
      # OIDC token minting — required by pypa/gh-action-pypi-publish to
      # exchange GitHub identity for a short-lived PyPI upload token.
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
