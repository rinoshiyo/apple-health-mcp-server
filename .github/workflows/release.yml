name: Release

# Push a tag matching `v<MAJOR>.<MINOR>.<PATCH>` (optionally with a
# pre-release / build suffix) to build the wheel + sdist and publish
# them to PyPI via OIDC Trusted Publishing. No API keys are stored in
# this repository.
#
# One-time setup is documented in CLAUDE.md section 8 (PyPI Project
# name, GitHub owner / repo / workflow / environment); kept there as
# the single source of truth so this header can stay narrow.

on:
  push:
    tags:
      # Strict semver-ish pattern. The empty-glob style `v*` matched
      # mistakes like `v-test` and would trigger a publish on the
      # first such tag push, permanently burning a version number on
      # PyPI.
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: read

jobs:
  build_bundle:
    name: Build MCPB (Claude Desktop) bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify manifest version matches tag
        # The MCPB bundle embeds manifest.json verbatim; a drift between
        # the tag, pyproject [project].version, and manifest.json version
        # would publish a bundle that disagrees with PyPI on which
        # release it is. The pyproject check in the `build` job covers
        # the tag↔pyproject pair; this catches the third leg.
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          manifest_version="$(python3 -c 'import json; print(json.load(open("manifest.json"))["version"])')"
          if [ "$tag_version" != "$manifest_version" ]; then
            echo "::error::Tag v$tag_version does not match manifest.json version $manifest_version. Bump manifest.json and re-tag."
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME matches manifest.json version $manifest_version."

      - name: Install MCPB CLI
        run: npm install -g @anthropic-ai/mcpb

      - name: Validate manifest
        run: mcpb validate manifest.json

      - name: Pack bundle
        # `mcpb pack` writes ``<name>-<version>.mcpb`` next to manifest.
        run: mcpb pack . apple-health-mcp-server-${{ github.ref_name }}.mcpb

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: mcpb
          path: apple-health-mcp-server-*.mcpb
          if-no-files-found: error
          retention-days: 7

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        # setup-uv switched to immutable releases at v8.0.0 -- no
        # floating `v8` tag exists, so pin to the exact patch.
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Verify tag matches pyproject version
        # A tag of `v0.1.1` paired with a pyproject still on `0.1.0`
        # would silently publish `0.1.0` again (or get rejected by
        # PyPI's "file already exists" gate), and the tag would point
        # at a release that never made it to the registry. Fail early.
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          project_version="$(uv run python -c 'import tomllib; print(tomllib.loads(open("pyproject.toml","rb").read().decode())["project"]["version"])')"
          if [ "$tag_version" != "$project_version" ]; then
            echo "::error::Tag v$tag_version does not match pyproject [project] version $project_version. Bump pyproject and re-tag."
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME matches pyproject version $project_version."

      - name: Build sdist and wheel
        run: uv build

      - name: Verify metadata with twine (strict)
        # `--strict` upgrades WARN-level findings (e.g. README rendered
        # as plain text on PyPI because long_description_content_type
        # is missing) into errors, catching them before upload.
        run: uvx twine check --strict dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish to PyPI via Trusted Publishing
    needs: build
    runs-on: ubuntu-latest
    # The `pypi` environment must be configured on PyPI as the Trusted
    # Publisher target; CLAUDE.md section 8 has the one-time
    # registration steps.
    environment:
      name: pypi
      url: https://pypi.org/project/apple-health-mcp-server/
    permissions:
      # Job-level `permissions:` REPLACES the top-level block rather
      # than merging — restating `contents: read` keeps the publish job
      # safe if a future edit adds a checkout step. `id-token: write`
      # is what `pypa/gh-action-pypi-publish` exchanges for the PyPI
      # upload token via OIDC.
      contents: read
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Re-runs of a partially-successful publish (e.g. the
          # workflow was re-dispatched after a transient network
          # failure) would otherwise hard-fail with 400 "file already
          # exists". `skip-existing` makes the step a no-op when PyPI
          # already has the artefact, which is the desired idempotent
          # behaviour for a tag-triggered release.
          skip-existing: true

  github_release:
    name: Create GitHub Release with PyPI artefacts + MCPB bundle
    # Depend on `publish` (not just `build`) so a failed PyPI upload
    # blocks the GitHub Release. Otherwise the release page would
    # advertise an `uvx ...` install path whose PyPI artefact never
    # landed, and users would hit ``No matching distribution found``.
    needs: [publish, build_bundle]
    runs-on: ubuntu-latest
    permissions:
      # `contents: write` is what ``softprops/action-gh-release`` needs
      # to push the release and upload assets. Job-level scoping keeps
      # the write permission off every other job in this workflow.
      contents: write
    steps:
      - name: Download PyPI build artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Download MCPB bundle artifact
        uses: actions/download-artifact@v7
        with:
          name: mcpb
          path: mcpb/

      - name: Create release with both artefact sets attached
        # The release is created with the tag as the name; the body
        # links readers at CHANGELOG.md for the full change list rather
        # than auto-generating release notes (the human-curated entry
        # is the canonical version-history record for this project).
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            mcpb/*.mcpb
          generate_release_notes: false
          body: |
            See [CHANGELOG.md at this tag](https://github.com/rinoshiyo/apple-health-mcp-server/blob/${{ github.ref_name }}/CHANGELOG.md) for the full change list pinned to this release (the `main` link rots as new versions ship).

            ## Install

            - **uvx / PyPI (recommended for Claude Code, Codex CLI, scripts):** see README ["Installation"](https://github.com/rinoshiyo/apple-health-mcp-server/blob/${{ github.ref_name }}/README.md#installation).
            - **Claude Desktop (one-click):** download `apple-health-mcp-server-${{ github.ref_name }}.mcpb` from this release's assets and drag-and-drop it into Claude Desktop's *Settings → Connectors* panel. Requires [`uv`](https://docs.astral.sh/uv/) on `PATH` (the bundle wraps `uvx ... serve`).
