name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        # setup-uv switched to immutable releases at v8.0.0 -- no
        # floating `v8` tag exists, so pin to the exact patch.
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Lint (ruff check)
        run: uv run ruff check

      - name: Format check (ruff format)
        run: uv run ruff format --check

      - name: Type check (mypy strict)
        run: uv run mypy

      - name: Test with coverage
        run: >-
          uv run pytest --cov-branch --cov-fail-under=100
          --cov-report=term-missing --cov-report=xml --cov-report=html

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: warn
          retention-days: 14

      - name: Upload coverage HTML
        # HTML rendering is identical across matrix cells, so ship it from
        # only one canonical job and rely on the machine-readable XML for
        # the rest.
        if: always() && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: htmlcov/
          if-no-files-found: warn
          retention-days: 14
