name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  metadata-checks:
    # Cheap PR-time gates for repository metadata drift. Two independent
    # checks live here:
    #
    # 1. ``check_version_parity.py`` — pyproject.toml ↔ manifest.json ↔
    #    uv.lock agree on the project version. Without this, a one-file
    #    bump only surfaces on the ``v*`` tag push, where the only
    #    recourse is a hot-fix tag (the v0.4.x cycle had to hand-bump
    #    three files; PR #80 hot-fixed a release.yml drift discovered
    #    after v0.2.0 was tagged).
    #
    # 2. ``check_lp_no_version_literal.py`` — ``docs/i18n/*.json`` may not
    #    embed a ``vN.M.K`` literal outside the sanctioned
    #    ``footer.version`` slot. The 2026-06-25 grill picked the
    #    /releases/latest pointer approach so the LP never goes stale;
    #    this guard prevents a future contributor from pasting the
    #    bundle filename back into the JSON.
    name: Metadata checks (version parity, LP literals)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies (lockfile-frozen)
        run: uv sync --frozen --all-groups

      - name: Check version parity (pyproject ↔ manifest ↔ uv.lock)
        run: uv run python scripts/check_version_parity.py

      - name: Check LP copy has no version literal outside footer.version
        run: uv run python scripts/check_lp_no_version_literal.py

  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        # setup-uv switched to immutable releases at v8.0.0 -- no
        # floating `v8` tag exists, so pin to the exact patch.
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Lint (ruff check)
        run: uv run ruff check

      - name: Format check (ruff format)
        run: uv run ruff format --check

      - name: Type check (mypy strict)
        run: uv run mypy

      - name: Test with coverage
        run: >-
          uv run pytest --cov-branch --cov-fail-under=100
          --cov-report=term-missing --cov-report=xml --cov-report=html

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: warn
          retention-days: 14

      - name: Upload coverage HTML
        # HTML rendering is identical across matrix cells, so ship it from
        # only one canonical job and rely on the machine-readable XML for
        # the rest.
        if: always() && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: htmlcov/
          if-no-files-found: warn
          retention-days: 14
